apiVersion: apps/v1
kind: Deployment
metadata:
  name: bms-app
  namespace: omkar-ns
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bms-app
  template:
    metadata:
      labels:
        app: bms-app
    spec:
      containers:
      - name: bms-container
        image: omkartakalkar/bms-app:v1.0.0
        ports:
        - containerPort: 3000